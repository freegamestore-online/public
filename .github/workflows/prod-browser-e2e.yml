name: Prod browser e2e

# Runs the real creator UI in a browser against production. This complements
# the API/platform e2e canary: if this fails and the API canary passes, the bug
# is likely in the console UI, routing, or browser-only state.

on:
  schedule:
    - cron: '47 15 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run production browser e2e
        run: pnpm test:prod:browser
        env:
          FGS_E2E_GITHUB_TOKEN: ${{ secrets.FGS_E2E_GITHUB_TOKEN }}

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-browser-e2e-artifacts
          path: test-results/prod-browser-e2e
          if-no-files-found: ignore
