name: Prod platform e2e

# Runs the real creator-facing production path and surrounding platform checks:
# console /api/create -> admin /api/provision -> GitHub repo from template ->
# registry + host route -> first deploy -> live game URL -> cleanup.
# Also covers auth gates, console API reads, agent health/session/key reads,
# leaderboard, sample hosted games, repo visibility, and cleanup effects.
#
# Required secret:
#   FGS_E2E_GITHUB_TOKEN: a low-privilege canary creator GitHub token. The auth
#   worker exchanges it for a fresh fgs_token at run time.

on:
  schedule:
    - cron: '17 15 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  platform-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run production platform e2e
        run: node scripts/prod-create-canary.mjs
        env:
          FGS_E2E_GITHUB_TOKEN: ${{ secrets.FGS_E2E_GITHUB_TOKEN }}
